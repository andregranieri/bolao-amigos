<style>

  .wrap{max-width:620px; margin:0 auto; padding:0 14px;}

  .userbar input{flex:1; min-width:0;}

  input[type=text], input[type=number]{

  .team .name{margin-top:5px; font-size:11px; letter-spacing:1px; font-weight:700; text-shadow:1px 1px 0 #000;}
  .vs-box{background:#000; border:2px solid var(--gold); border-radius:3px; padding:6px 8px;

  .status.open{color:var(--ok);} .status.locked{color:var(--gold);} .status.revealed{color:var(--chrome);}

  /* alcunha */

  .grow.locked .pv{color:var(--chrome-dark);}
  .grow.hit{border-left-color:var(--ok); background:#0d2417;}
  .grow.hit .pv{color:var(--ok);}

  .share-row{display:flex; gap:8px; padding:10px 12px 14px; justify-content:center; flex-wrap:wrap;}
  .btn.wpp{background:linear-gradient(180deg,#25d366,#128c3e); color:#04240f; box-shadow:0 4px 0 #0a5c26,0 5px 6px rgba(0,0,0,0.4);}

  /* ===== RANKING ===== */
  .rank-card{background:var(--panel); border:2px solid var(--gold); border-radius:6px;
    margin:18px 0; overflow:hidden; box-shadow:0 6px 0 rgba(0,0,0,0.5);}
  .rank-head{background:linear-gradient(180deg,var(--panel2),#0a1436); padding:10px 12px;
    font-size:10px; letter-spacing:2px; color:var(--gold); text-align:center;

  .rank-scroll{overflow-x:auto;}
  .rank-table{width:100%; border-collapse:collapse; font-size:12px;}
  .rank-table th{font-size:8px; font-family:'Press Start 2P',monospace; color:var(--txt-dim);
    padding:8px 6px; letter-spacing:1px; border-bottom:1px solid var(--chrome-dark); text-align:center; white-space:nowrap;}
  .rank-table td{padding:7px 6px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.07); color:var(--txt);}
  .rank-table .tl{text-align:left; padding-left:10px;}
  .rank-table .nm{font-weight:600; font-size:13px; white-space:nowrap;}
  .rank-table .pos{font-size:10px; color:var(--gold);}
  .rank-table .pts{font-size:12px; color:var(--gold);}
  .rank-table tr.lead td{background:rgba(245,197,66,0.10);}
  .rank-table tr.lead .pos::after{content:' 👑'; font-size:10px;}
  .rank-table .guest{color:var(--txt-dim);}
  .rank-foot{font-size:9px; color:var(--txt-dim); padding:8px 12px; text-align:center; letter-spacing:0.5px;}
  .pts-chip{font-family:'Press Start 2P',monospace; font-size:9px; color:#04240f;
    background:var(--gold); border-radius:2px; padding:2px 5px; margin-left:6px;}
  .grow.hit .pts-chip{background:var(--ok);}

  .foot{text-align:center; font-size:9px; color:var(--txt-dim); margin-top:24px; letter-spacing:1px; line-height:1.8;}
  .foot .pixel{font-size:8px; color:var(--gold);}
  .loading{text-align:center; padding:40px 0; color:var(--txt-dim); font-size:11px; letter-spacing:2px;}
  .admin-toggle{text-align:center; margin-top:10px;}
  .admin-toggle .btn{background:#1a2447; color:var(--txt-dim); box-shadow:0 3px 0 #0a1230;}
</style>

<div class="cover">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ========================================================================
//  >>> COLE AQUI A CONFIG DO SEU FIREBASE (instruções no chat) <<<
// ========================================================================
const firebaseConfig = {
  apiKey: "AIzaSyA1lUwazoJ__-vM2ceJncFEJe1l0AOCbvQ",
  authDomain: "bolao-amigos-c6534.firebaseapp.com",
  databaseURL: "https://bolao-amigos-c6534-default-rtdb.firebaseio.com",
  projectId: "bolao-amigos-c6534",
  storageBucket: "bolao-amigos-c6534.firebasestorage.app",
  messagingSenderId: "1054127797755",
  appId: "1:1054127797755:web:e288b1388d33220fb4475e",
  measurementId: "G-R8NWRQK9DZ"
};
// ========================================================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LOCK_MIN = 30, REVEAL_MIN = 25;
const ADMIN_PIN = "1010"; // troque se quiser

// ===================== SISTEMA DE PONTUAÇÃO =====================
// Placar exato: 5 pts (absorve tudo)
// Empate acertado com placar errado: 3 pts (absorve ponto de gols)
// Acertou vencedor com placar errado: 2 pts (+1 se acertou gols de um time)
// Acertou gols de 1 time e errou o resto: 1 pt
// Errou tudo: 0
// Jogo bônus (bonus:true nos MATCHES): pontos x2; critérios de desempate valem pelo base.
// Critérios de desempate (ordem): Ex.BRA > Ex.Geral > Ac.Venc > Ac.Emp > divide o prêmio.
// Sem palpite: 0 pts e nada conta para critérios.
// Prorrogação: lançar o placar do fim dos 30 min extras. Pênaltis não contam.

// PARTICIPANTES OFICIAIS + SALDO ACUMULADO (fases anteriores).
// >>> PREENCHA com os valores atuais do bolão de vocês <<<
// pts = pontos totais | exBra = placares exatos em jogos do Brasil |
// exGeral = placares exatos no geral | acVenc = acertos de vencedor | acEmp = acertos de empate
const SALDO_INICIAL = {
  "Moeção":     { pts:324, exBra:1, exGeral:15, acVenc:66, acEmp:3 },
  "Cantarelli": { pts:320, exBra:2, exGeral:17, acVenc:63, acEmp:4 },
  "Lepo Lepo":  { pts:317, exBra:2, exGeral:15, acVenc:64, acEmp:2 },
  "Soneca":     { pts:311, exBra:2, exGeral:17, acVenc:62, acEmp:4 },
  "Georges":    { pts:309, exBra:1, exGeral:14, acVenc:66, acEmp:3 },
  "Cabral":     { pts:294, exBra:2, exGeral:10, acVenc:67, acEmp:2 },
  "Biriba":     { pts:290, exBra:1, exGeral:12, acVenc:60, acEmp:3 },
  "Dedé":       { pts:287, exBra:1, exGeral:10, acVenc:62, acEmp:0 },
  "Renato":     { pts:286, exBra:2, exGeral:13, acVenc:60, acEmp:3 },
  "Marcos":     { pts:284, exBra:0, exGeral:10, acVenc:63, acEmp:2 },
  "Samuel":     { pts:280, exBra:0, exGeral:11, acVenc:63, acEmp:2 },
  "Aurélio":    { pts:259, exBra:1, exGeral:7,  acVenc:55, acEmp:1 },
  "Adones":     { pts:221, exBra:0, exGeral:5,  acVenc:49, acEmp:3 },
};
// =================================================================

// Partidas das quartas (horários em Brasília -03:00). Edite se precisar.
// Partidas das quartas (horários em Brasília -03:00). Edite se precisar.
// FASE ELIMINATÓRIA: todos os jogos valem pontos em DOBRO (bonus:true).
// Critérios de desempate seguem contando pelo valor base, conforme a regra.
const MATCHES = [
  { id:"sf1", round:"SEMIFINAL · JOGO 1", a:"FRANÇA", b:"ESPANHA", fa:"fr", fb:"es", ea:"🇫🇷", eb:"🇪🇸", bonus:true, kickoff:"2026-07-14T16:00:00-03:00" },
  { id:"sf2", round:"SEMIFINAL · JOGO 2", a:"ARGENTINA", b:"INGLATERRA", fa:"ar", fb:"gb-eng", ea:"🇦🇷", eb:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", bonus:true, kickoff:"2026-07-15T16:00:00-03:00" },
  { id:"tp3", round:"DISPUTA DE 3º LUGAR", a:"A DEFINIR", b:"A DEFINIR", fa:"tbd", fb:"tbd", ea:"❓", eb:"❓", bonus:true, kickoff:"2026-07-18T17:00:00-03:00" },
  { id:"fin", round:"🏆 GRANDE FINAL", a:"A DEFINIR", b:"A DEFINIR",   fa:"tbd", fb:"tbd", ea:"❓", eb:"❓", bonus:true, kickoff:"2026-07-19T16:00:00-03:00" },
];

let serverOffset = 0;        // diferença entre relógio do servidor e o local
let guesses = {};            // { matchId: { nick: {a,b,ts} } }
let results = {};            // { matchId: {a,b} }
let adminMode = false;

// ===== JOGO TESTE (simulação) =====
// Deixe true para exibir um jogo de teste que "começa" 35 min após a 1ª carga.
// Ciclo completo em ~10 min: 5 min aberto -> trava -> 5 min trancado -> revela.
// O horário fica salvo no Firebase, então todos os aparelhos veem o MESMO timer.
// Depois do teste: mude para false (e apague guesses/teste no Firebase, se quiser).
const SHOW_TEST = false;
const TEST_MATCH = { id:"teste", round:"⚡ JOGO TESTE · SIMULAÇÃO", a:"BRASIL", b:"NORUEGA", fa:"br", fb:"no", ea:"🇧🇷", eb:"🇳🇴", kickoff:null };
// ==================================

const $ = s => document.querySelector(s);
const savedNick = () => localStorage.getItem('bolao_nick') || '';

// hora "real" = local + offset do servidor
function now(){ return Date.now() + serverOffset; }
function kickMs(m){ return new Date(m.kickoff).getTime(); }
function phaseOf(m){
  const t = now(), k = kickMs(m);
  if (t < k - LOCK_MIN*60000) return 'open';
  if (t < k - REVEAL_MIN*60000) return 'locked';
  return 'revealed';
}
function pad(n){ return String(n).padStart(2,'0'); }
function fmtRemain(ms){ if(ms<0)ms=0; const s=Math.floor(ms/1000),h=Math.floor(s/3600),
  m=Math.floor(s%3600/60),ss=s%60; return h>0?`${h}:${pad(m)}:${pad(ss)}`:`${pad(m)}:${pad(ss)}`; }
function fmtWhen(m){ return new Date(m.kickoff).toLocaleString('pt-BR',
  {weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- sincronizar relógio do servidor ----
async function syncClock(){
  try{
    const r = ref(db, '.info/serverTimeOffset');
    onValue(r, snap => { const off = snap.val(); if(typeof off==='number') serverOffset = off; });
  }catch(e){ serverOffset = 0; }
}

// ---- ouvir dados ----
// entries = quem já palpitou (nomes, público) | guesses = placares (leitura LIBERADA
// pelo servidor só após a revelação, via regras de segurança do Firebase)
let entries = {};
const gAttached = {};
function listen(){
  onValue(ref(db,'entries'), s => { entries = s.val() || {}; render(); });
  onValue(ref(db,'results'), s => { results = s.val() || {}; render(); });
  if(SHOW_TEST){
    onValue(ref(db,'testKickoff'), s => {
      const tk = s.val();
      if(tk){ TEST_MATCH.kickoff = new Date(tk).toISOString(); render(); }
    });
  }
  ensureGuessListeners();
}
// anexa o listener de placares de cada jogo somente quando a revelação chega;
// se o servidor ainda recusar (diferença de relógio), tenta de novo em 3s
function ensureGuessListeners(){
  for(const m of allMatches()){
    if(gAttached[m.id]) continue;
    if(phaseOf(m)!=='revealed') continue;
    gAttached[m.id] = true;
    onValue(ref(db,`guesses/${m.id}`),
      s => { guesses[m.id] = s.val() || {}; render(); },
      () => { setTimeout(()=>{ gAttached[m.id] = false; }, 3000); });
  }
}

// ---- enviar palpite ----
async function submitGuess(m, nick, a, b, msgEl){
  nick = (nick||'').trim();
  if(!nick){ msgEl.textContent = '⚠ DIGITE SUA ALCUNHA'; return; }
  if(a===''||b===''){ msgEl.textContent = '⚠ PREENCHA OS DOIS PLACARES'; return; }
  if(phaseOf(m)!=='open'){ msgEl.textContent = '🔒 PALPITES JÁ TRANCADOS'; return; }
  localStorage.setItem('bolao_nick', nick); // lembra a alcunha nos próximos cards
  const key = normKey(nick);
  try{
    await set(ref(db, `guesses/${m.id}/${key}`), { nick, a:+a, b:+b, ts: serverTimestamp() });
    await set(ref(db, `entries/${m.id}/${key}`), { nick, ts: serverTimestamp() });
    msgEl.textContent = '✔ PALPITE SALVO! (editável até a trava)';
  }catch(e){
    msgEl.textContent = phaseOf(m)!=='open' ? '🔒 PALPITES JÁ TRANCADOS' : '⚠ ERRO AO SALVAR — VEJA CONEXÃO';
  }
}

async function saveResult(m, a, b, msgEl){
  if(a===''||b===''){ msgEl.textContent='⚠ PREENCHA O RESULTADO'; return; }
  try{ await set(ref(db,`results/${m.id}`), {a:+a,b:+b}); msgEl.textContent='✔ RESULTADO SALVO'; }
  catch(e){ msgEl.textContent='⚠ ERRO'; }
}

// ---- normalização de alcunha (identidade única) ----
function normKey(nick){
  return String(nick).normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_')
    .replace(/^_|_$/g,'').slice(0,20) || 'jogador';
}

// ---- PONTUAÇÃO: calcula pontos e critérios de um palpite ----
// Retorna { pts (já com bônus), base, exact, venc, emp }
function scoreGuess(guess, res, match){
  const gA=+guess.a, gB=+guess.b, rA=+res.a, rB=+res.b;
  const gOut = gA>gB ? 'A' : (gB>gA ? 'B' : 'D'); // resultado do palpite
  const rOut = rA>rB ? 'A' : (rB>rA ? 'B' : 'D'); // resultado oficial
  const exact = (gA===rA && gB===rB);
  const golHit = (gA===rA || gB===rB); // acertou gols de ao menos 1 time
  let base=0, venc=0, emp=0;

  if(exact){
    base = 5;                              // absorve tudo
    if(rOut==='D') emp=1; else venc=1;
  } else if(rOut==='D' && gOut==='D'){
    base = 3;                              // empate certo, placar errado (absorve gols)
    emp = 1;
  } else if(gOut===rOut){
    base = 2 + (golHit ? 1 : 0);           // vencedor certo + eventual ponto de gols
    venc = 1;
  } else {
    base = golHit ? 1 : 0;                 // só ponto de gols, ou nada
  }
  const pts = match.bonus ? base*2 : base; // bônus dobra pontos; critérios ficam no base
  return { pts, base, exact, venc, emp };
}

function isBrazilMatch(m){ return m.a==='BRASIL' || m.b==='BRASIL'; }

// ---- RANKING: saldo inicial + todos os jogos com resultado ----
function computeRanking(){
  const players = {};
  for(const [nick, s] of Object.entries(SALDO_INICIAL)){
    players[normKey(nick)] = { nick, official:true, pts:s.pts, exBra:s.exBra, exGeral:s.exGeral, acVenc:s.acVenc, acEmp:s.acEmp };
  }
  for(const m of MATCHES){                 // jogo teste NÃO conta pro ranking
    const res = results[m.id]; if(!res) continue;
    const g = guesses[m.id] || {};
    for(const [k,x] of Object.entries(g)){
      if(!players[k]) players[k] = { nick:x.nick, official:false, pts:0, exBra:0, exGeral:0, acVenc:0, acEmp:0 };
      const s = scoreGuess(x, res, m);
      const p = players[k];
      p.pts += s.pts;
      if(s.exact){ p.exGeral += 1; if(isBrazilMatch(m)) p.exBra += 1; }
      p.acVenc += s.venc;
      p.acEmp += s.emp;
    }
  }
  const arr = Object.values(players);
  // ordem: pts > Ex.BRA > Ex.Geral > Ac.Venc > Ac.Emp (empate total = divide prêmio)
  arr.sort((a,b)=> b.pts-a.pts || b.exBra-a.exBra || b.exGeral-a.exGeral || b.acVenc-a.acVenc || b.acEmp-a.acEmp || a.nick.localeCompare(b.nick,'pt'));
  // posições com empate real compartilhado
  let pos=0, prev=null;
  arr.forEach((p,i)=>{
    const sig = [p.pts,p.exBra,p.exGeral,p.acVenc,p.acEmp].join('|');
    if(sig!==prev){ pos=i+1; prev=sig; }
    p.pos = pos;
  });
  return arr;
}

function renderRanking(){
  const el = $('#ranking');
  if(!el) return;
  const arr = computeRanking();
  if(!arr.length){ el.innerHTML=''; return; }
  const hasTie = arr.some((p,i)=> i>0 && p.pos===arr[i-1].pos);
  el.innerHTML = `
  <div class="rank-card">
    <div class="rank-head pixel">🏆 CLASSIFICAÇÃO GERAL</div>
    <div class="rank-scroll">
    <table class="rank-table">
      <thead><tr>
        <th>#</th><th class="tl">JOGADOR</th><th>PTS</th>
        <th title="Placares exatos em jogos do Brasil">Ex.BRA</th>
        <th title="Placares exatos no geral">Ex.G</th>
        <th title="Acertos de vencedor">Ac.V</th>
        <th title="Acertos de empate">Ac.E</th>
      </tr></thead>
      <tbody>
      ${arr.map(p=>`<tr class="${p.pos===1?'lead':''}">
        <td class="pos pixel">${p.pos}</td>
        <td class="tl nm">${esc(p.nick)}${p.official?'':' <span class="guest">*</span>'}</td>
        <td class="pts pixel">${p.pts}</td>
        <td>${p.exBra}</td><td>${p.exGeral}</td><td>${p.acVenc}</td><td>${p.acEmp}</td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>
    <div class="rank-foot">Desempate: Ex.BRA → Ex.Geral → Ac.Venc → Ac.Emp → divide o prêmio${hasTie?' · há posições empatadas':''}${arr.some(p=>!p.official)?' · * fora da lista oficial':''}</div>
  </div>`;
}


function matchSummary(m){
  const g = guesses[m.id] || {};
  const list = Object.values(g).sort((x,y)=>(x.ts||0)-(y.ts||0));
  const res = results[m.id];
  return { list, res };
}

async function genPDF(m, btn){
  const { list, res } = matchSummary(m);
  if(btn){ btn.disabled = true; btn.textContent = '⏳ GERANDO...'; }
  const node = buildPdfNode(m, list, res);
  document.body.appendChild(node);
  try{
    // esperar bandeiras carregarem
    await Promise.all([...node.querySelectorAll('img')].map(img =>
      img.decode().catch(()=>{})));
    const canvas = await html2canvas(node.firstElementChild, { useCORS:true, backgroundColor:'#0c1836', scale:2 });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit:'mm', format:'a4' });
    const margin = 12, w = 210 - margin*2, pageH = 297 - margin*2;
    const pxPerMm = canvas.width / w;
    const totalH = canvas.height / pxPerMm;
    if(totalH <= pageH){
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, margin, w, totalH);
    } else {
      // fatiar em páginas
      const pagePx = Math.floor(pageH * pxPerMm);
      const slice = document.createElement('canvas');
      const ctx = slice.getContext('2d');
      let y = 0, first = true;
      while(y < canvas.height){
        const h = Math.min(pagePx, canvas.height - y);
        slice.width = canvas.width; slice.height = h;
        ctx.fillStyle = '#0c1836'; ctx.fillRect(0,0,slice.width,h);
        ctx.drawImage(canvas, 0, y, canvas.width, h, 0, 0, canvas.width, h);
        if(!first) pdf.addPage();
        pdf.addImage(slice.toDataURL('image/png'), 'PNG', margin, margin, w, h/pxPerMm);
        first = false; y += h;
      }
    }
    const fname = `bolao_${m.a}_x_${m.b}`.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'_');
    pdf.save(fname + '.pdf');
  }catch(e){
    alert('Erro ao gerar PDF: ' + e.message);
  }finally{
    node.remove();
    if(btn){ btn.disabled = false; btn.textContent = '📄 BAIXAR PDF'; }
  }
}

// ---- texto pro WhatsApp ----
function genWhatsText(m){
  const { list, res } = matchSummary(m);
  const L = [];
  L.push('🏆 *BOLÃO COPA 2026*');
  L.push(`${m.ea||'⚽'} *${m.a} × ${m.b}* ${m.eb||'⚽'}`);
  L.push(`📅 ${fmtWhen(m)}`);
  if(res) L.push(`🥅 Resultado: *${res.a} × ${res.b}*`);
  L.push('');
  L.push(`📋 *Palpites (${list.length}):*`);
  list.forEach(x=>{
    const s = res ? scoreGuess(x, res, m) : null;
    const hit = s && s.exact;
    L.push(`${hit?'🎯':'▪️'} ${x.nick} — *${x.a} × ${x.b}*${s?` (+${s.pts} pt${s.pts===1?'':'s'})`:''}`);
  });
  if(m.bonus) L.push('⭐ _Jogo bônus: pontos em dobro!_');
  L.push('');
  L.push('_Winning Edition_ 🎮');
  return L.join('\n');
}
function openWhats(m){
  const url = 'https://wa.me/?text=' + encodeURIComponent(genWhatsText(m));
  window.open(url, '_blank');
}

function allMatches(){
  return (SHOW_TEST && TEST_MATCH.kickoff) ? [TEST_MATCH, ...MATCHES] : MATCHES;
}

// ---- render ----
function render(){
  const board = $('#board');
  const ms = allMatches();
  board.innerHTML = ms.map(m => matchCard(m)).join('');
  // religar eventos
  ms.forEach(m => wire(m));
  renderRanking();
}

function matchCard(m){
  const ph = phaseOf(m);
  const k = kickMs(m);
  const g = guesses[m.id] || {};
  const list = Object.values(g).sort((x,y)=>(x.ts||0)-(y.ts||0));
  const res = results[m.id];

  let status='';
  if(ph==='open') status=`<div class="status open pixel">PALPITES ABERTOS · TRAVA EM<span class="clock" data-clock="lock" data-k="${k}">--:--</span></div>`;
  else if(ph==='locked') status=`<div class="status locked pixel">🔒 TRANCADO · REVELA EM<span class="clock" data-clock="reveal" data-k="${k}">--:--</span></div>`;
  else status=`<div class="status revealed pixel">✅ PALPITES REVELADOS</div>`;

  // input de palpite (só na fase open)
  let input='';
  if(ph==='open'){
    input=`<div class="alcunha-row">
        <label class="pixel">ALCUNHA</label>
        <input type="text" class="alc" id="nk_${m.id}" placeholder="seu apelido" maxlength="16" value="${esc(savedNick())}"/>
      </div>
      <div class="guess-in">
        <span class="tnm">${esc(m.a)}</span>
        <input class="sc" type="number" min="0" max="99" id="a_${m.id}" placeholder="0"/>
        <span class="x">×</span>
        <input class="sc" type="number" min="0" max="99" id="b_${m.id}" placeholder="0"/>
        <span class="tnm">${esc(m.b)}</span>
      </div>
      <div class="guess-actions">
        <button class="btn" id="send_${m.id}">ENVIAR PALPITE</button>
        <div class="msg pixel" id="msg_${m.id}"></div>
      </div>`;
  }

  // lista de palpites: antes da revelação só os NOMES (nó público 'entries');
  // os placares ('guesses') o servidor só entrega após a revelação
  let listHtml='';
  const reveal = ph==='revealed';
  if(!reveal){
    const e = entries[m.id] || {};
    const names = Object.values(e).sort((x,y)=>(x.ts||0)-(y.ts||0));
    listHtml = names.length
      ? `<div class="glist"><div class="lhead">${names.length} PALPITE(S)</div>` +
        names.map(x=>`<div class="grow locked"><span class="nk">${esc(x.nick)}</span><span class="pv">? × ?</span></div>`).join('') + `</div>`
      : `<div class="glist"><div class="lhead">nenhum palpite ainda</div></div>`;
  } else if(guesses[m.id] === undefined){
    listHtml = `<div class="glist"><div class="lhead">revelando palpites…</div></div>`;
  } else if(list.length){
    listHtml = `<div class="glist"><div class="lhead">${list.length} PALPITE(S)</div>` +
      list.map(x=>{
        const s = res ? scoreGuess(x, res, m) : null;
        const hit = s && s.exact;
        return `<div class="grow ${hit?'hit':''}">
          <span class="nk">${esc(x.nick)}</span>
          ${hit?'<span class="badge">ACERTOU!</span>':''}
          <span class="pv">${x.a} × ${x.b}</span>
          ${s?`<span class="pts-chip">+${s.pts}</span>`:''}</div>`;
      }).join('') + `</div>`;
  } else {
    listHtml = `<div class="glist"><div class="lhead">nenhum palpite registrado</div></div>`;
  }

  // resultado oficial (revelado) + admin
  let resultHtml='';
  if(ph==='revealed'){
    if(res){
      resultHtml=`<div class="result-in"><div class="rlbl pixel">RESULTADO OFICIAL: ${res.a} × ${res.b}</div></div>`;
    } else if(adminMode){
      resultHtml=`<div class="result-in">
        <div class="rlbl pixel">DEFINIR RESULTADO OFICIAL</div>
        <div class="guess-in" style="padding:0 0 8px">
          <input class="sc" type="number" min="0" max="99" id="ra_${m.id}" placeholder="0"/>
          <span class="x">×</span>
          <input class="sc" type="number" min="0" max="99" id="rb_${m.id}" placeholder="0"/>
        </div>
        <div style="text-align:center"><button class="btn blue sm" id="res_${m.id}">SALVAR RESULTADO</button>
        <div class="msg pixel" id="rmsg_${m.id}"></div></div>
      </div>`;
    }
    // botões de compartilhamento (só se houver palpites)
    if(list.length){
      resultHtml += `<div class="share-row">
        <button class="btn sm" id="pdf_${m.id}">📄 BAIXAR PDF</button>
        <button class="btn sm wpp" id="wpp_${m.id}">💬 ENVIAR NO WHATSAPP</button>
      </div>`;
    }
  }

  return `<div class="match">
    <div class="match-head"><span class="round pixel">${m.round}${m.bonus?' ★ BÔNUS 2X':''}</span><span class="when">${fmtWhen(m)}</span></div>
    <div class="scoreboard">
      <div class="team"><img class="flag" src="https://flagcdn.com/w80/${m.fa}.png" alt="${esc(m.a)}" onerror="this.style.display='none'"/><div class="name">${esc(m.a)}</div></div>
      <div class="vs-box"><div class="vs pixel">VS</div></div>
      <div class="team"><img class="flag" src="https://flagcdn.com/w80/${m.fb}.png" alt="${esc(m.b)}" onerror="this.style.display='none'"/><div class="name">${esc(m.b)}</div></div>
    </div>
    ${status}${input}${listHtml}${resultHtml}
  </div>`;
}

function wire(m){
  const send = $(`#send_${m.id}`);
  if(send) send.onclick = ()=> submitGuess(m, $(`#nk_${m.id}`).value, $(`#a_${m.id}`).value, $(`#b_${m.id}`).value, $(`#msg_${m.id}`));
  const res = $(`#res_${m.id}`);
  if(res) res.onclick = ()=> saveResult(m, $(`#ra_${m.id}`).value, $(`#rb_${m.id}`).value, $(`#rmsg_${m.id}`));
  const pdf = $(`#pdf_${m.id}`);
  if(pdf) pdf.onclick = ()=> genPDF(m, pdf);
  const wpp = $(`#wpp_${m.id}`);
  if(wpp) wpp.onclick = ()=> openWhats(m);
}

// atualizar relógios a cada segundo sem re-render completo
setInterval(()=>{
  let needFull=false;
  document.querySelectorAll('[data-clock]').forEach(el=>{
    const k=+el.dataset.k, type=el.dataset.clock, t=now();
    const target = type==='lock' ? k-LOCK_MIN*60000 : k-REVEAL_MIN*60000;
    el.textContent = fmtRemain(target-t);
    if(target-t<=0) needFull=true;
  });
  if(needFull) render();
  ensureGuessListeners();
}, 1000);

$('#retestBtn').onclick = async ()=>{

  try{

    await set(ref(db,'testKickoff'), tk);

    await set(ref(db,'guesses/teste'), null);
    await set(ref(db,'entries/teste'), null);
    await set(ref(db,'results/teste'), null);
    delete guesses['teste']; gAttached['teste'] = false;
    TEST_MATCH.kickoff = new Date(tk).toISOString();
    render();
    alert('Jogo teste reiniciado! Novo início em 35 min.');
  }catch(e){ alert('Erro ao reiniciar: verifique o Firebase.'); }
};

await syncClock();
// semear matchMeta (lockAt/revealAt de cada jogo) — as regras do Firebase usam
// esses horários pra liberar leitura/gravação; criação única (create-only)
async function seedMeta(m){
  try{
    const k = kickMs(m);
    const snap = await get(ref(db,`matchMeta/${m.id}`));
    if(!snap.exists()){
      await set(ref(db,`matchMeta/${m.id}`), { lockAt: k-LOCK_MIN*60000, revealAt: k-REVEAL_MIN*60000 });
    }
  }catch(e){ /* já existe ou sem permissão de recriar: ok */ }
}
for(const m of MATCHES) await seedMeta(m);
if(SHOW_TEST){
  try{
    const snap = await get(ref(db,'testKickoff'));
    let tk = snap.exists() ? snap.val() : null;
    if(!tk){
      tk = Date.now() + serverOffset + 35*60000; // começa em 35 min (hora do servidor)
      await set(ref(db,'testKickoff'), tk);
      await set(ref(db,`matchMeta/teste`), { lockAt: tk-LOCK_MIN*60000, revealAt: tk-REVEAL_MIN*60000 });
    }
    TEST_MATCH.kickoff = new Date(tk).toISOString();
  }catch(e){
    // sem Firebase configurado ainda: usa horário local só pra visualizar
    TEST_MATCH.kickoff = new Date(Date.now() + 35*60000).toISOString();
  }
}
